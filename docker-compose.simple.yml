services:
  db:
    image: postgres:14
    environment:
      POSTGRES_PASSWORD: password
      POSTGRES_USER: postgres
      POSTGRES_DB: baseball_league_development
    ports:
      - "5432:5432"

  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: >
      bash -c "
        bundle install &&
        bundle exec rails db:create &&
        bundle exec rails db:migrate &&
        rm -f tmp/pids/server.pid &&
        bundle exec rails s -p 3000 -b '0.0.0.0'
      "
    volumes:
      - .:/app
      - bundler_data:/usr/local/bundle
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:password@db:5432/baseball_league_development
      RAILS_ENV: development
    depends_on:
      - db
    stdin_open: true
    tty: true

volumes:
  bundler_data: