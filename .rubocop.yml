require:
  - rubocop-rails
  - rubocop-rspec
  - rubocop-performance

AllCops:
  NewCops: enable
  TargetRubyVersion: 3.2
  Exclude:
    - 'db/schema.rb'
    - 'bin/**/*'
    - 'node_modules/**/*'
    - 'vendor/**/*'
    - 'tmp/**/*'
    - 'log/**/*'

Style/Documentation:
  Enabled: false

Style/FrozenStringLiteralComment:
  Enabled: false

Style/StringLiterals:
  Enabled: false

Metrics/BlockLength:
  Exclude:
    - 'spec/**/*'
    - 'config/routes.rb'
    - 'lib/tasks/**/*'

Metrics/MethodLength:
  Max: 15
  Exclude:
    - 'app/models/player_analytics.rb'
    - 'app/models/team_analytics.rb'
    - 'app/models/performance_report.rb'

Metrics/AbcSize:
  Max: 20
  Exclude:
    - 'app/models/player_analytics.rb'
    - 'app/models/team_analytics.rb'
    - 'app/models/performance_report.rb'

Metrics/ClassLength:
  Max: 100
  Exclude:
    - 'app/models/player_analytics.rb'
    - 'app/models/team_analytics.rb'
    - 'app/models/performance_report.rb'

Layout/LineLength:
  Max: 120

Style/MultilineBlockChain:
  Exclude:
    - 'app/models/performance_report.rb'

Metrics/CyclomaticComplexity:
  Max: 7
  Exclude:
    - 'app/models/team_analytics.rb'
    - 'app/models/performance_report.rb'

Metrics/PerceivedComplexity:
  Max: 8
  Exclude:
    - 'app/models/team_analytics.rb'

Rails:
  Enabled: true

Rails/FilePath:
  Enabled: false

Rails/HasManyOrHasOneDependent:
  Enabled: true

Rails/NotNullColumn:
  Enabled: false

RSpec/MultipleExpectations:
  Max: 5

RSpec/ExampleLength:
  Max: 15

RSpec/NestedGroups:
  Max: 4
