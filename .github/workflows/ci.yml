name: CI

# only one can run at a time
concurrency:
  # If PR, cancel prev commits. head_ref = source branch name on pull_request, null if push
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "supabase/**"
  workflow_dispatch:

# Supply chain security: Minimal permissions
permissions:
  contents: read
  packages: read
  actions: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      # Supply chain security: SHA pinning
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: oven-sh/setup-bun@735343b667d3e6f658f44d0eca948eb6282f2b76 # v2.0.2

      # Supply chain security: Safe Chain for malicious package detection
      - name: Setup safe-chain
        run: |
          npm i -g @aikidosec/safe-chain
          safe-chain setup-ci

      # Supply chain security: Disable lifecycle scripts (handled by make install-ci)
      - name: Install dependencies
        run: make install-ci

      - run: make lint-check

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      # Supply chain security: SHA pinning
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: oven-sh/setup-bun@735343b667d3e6f658f44d0eca948eb6282f2b76 # v2.0.2

      # Supply chain security: Safe Chain for malicious package detection
      - name: Setup safe-chain
        run: |
          npm i -g @aikidosec/safe-chain
          safe-chain setup-ci

      # Supply chain security: Disable lifecycle scripts (handled by make install-ci)
      - name: Install dependencies
        run: make install-ci

      - run: make typecheck

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      # Supply chain security: SHA pinning
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: oven-sh/setup-bun@735343b667d3e6f658f44d0eca948eb6282f2b76 # v2.0.2

      # Supply chain security: Safe Chain for malicious package detection
      - name: Setup safe-chain
        run: |
          npm i -g @aikidosec/safe-chain
          safe-chain setup-ci

      # Supply chain security: Disable lifecycle scripts (handled by make install-ci)
      - name: Install dependencies
        run: make install-ci

      - run: make test

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    steps:
      # Supply chain security: SHA pinning
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: oven-sh/setup-bun@735343b667d3e6f658f44d0eca948eb6282f2b76 # v2.0.2

      # Supply chain security: Safe Chain for malicious package detection
      - name: Setup safe-chain
        run: |
          npm i -g @aikidosec/safe-chain
          safe-chain setup-ci

      # Supply chain security: Disable lifecycle scripts (handled by make install-ci)
      - name: Install dependencies
        run: make install-ci

      - run: make build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
